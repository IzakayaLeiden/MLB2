name: CI
run-name: CI

on:
  workflow_dispatch:
  push:
    branches: [master, "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e .
      - run: python -m pytest
      - run: python -m compileall -q src tests

  sites:
    if: ${{ hashFiles('sites-app/package.json') != '' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sites-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sites-app/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
