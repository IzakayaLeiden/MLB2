name: Publish validated feed to Pages
run-name: Publish validated feed to Pages

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.gate.outputs.publish }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .
      - run: gh release download shadow-v1 --dir data/shadow
      - name: Recheck public gate
        id: gate
        shell: bash
        run: |
          today=$(TZ=America/New_York date +%F)
          python -m mlb_predictor gate --feeds-dir data/shadow --grades-dir data/shadow --model artifacts/model-v1/model-v1.json --as-of-date "$today" --output data/public-gate.json || code=$?
          if [ "${code:-0}" = "2" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${code:-0}" -ne "0" ]; then exit "$code"; fi
          echo "publish=true" >> "$GITHUB_OUTPUT"
      - name: Build Pages payload
        if: steps.gate.outputs.publish == 'true'
        run: python scripts/build_pages_feed.py --feeds-dir data/shadow --gate data/public-gate.json --model-summary artifacts/model-v1/validation-summary.json --output-dir dist/pages
      - uses: actions/configure-pages@v5
        if: steps.gate.outputs.publish == 'true'
      - uses: actions/upload-pages-artifact@v3
        if: steps.gate.outputs.publish == 'true'
        with:
          path: dist/pages

  deploy:
    needs: build
    if: needs.build.outputs.publish == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy without replacing the last good feed on gate failure
        id: deployment
        uses: actions/deploy-pages@v4
